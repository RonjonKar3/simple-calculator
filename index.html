<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header-container">
      <h1 class="main-title">Quick Math Hub</h1>
    </header>
    <div class="calculator">
      <p>Model: Casio SX-320P-W</p>
      <input type="text" class="display" placeholder="0" disabled />

      <div class="buttons">
        <button class="function-btn">AC</button>
        <button class="function-btn">DEL</button>
        <button class="operator-btn">%</button>
        <button class="operator-btn">/</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator-btn">*</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator-btn">-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator-btn">+</button>

        <button>00</button>
        <button>0</button>
        <button>.</button>
        <button class="operator-btn">=</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
